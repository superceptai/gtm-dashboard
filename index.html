<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Supercept GTM Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --primary:#0B0BD6;
    --primary-06:rgba(11,11,214,0.06);
    --primary-12:rgba(11,11,214,0.12);
    --secondary:#914BF9;
    --secondary-10:rgba(145,75,249,0.10);
    --accent:#19F991;
    --accent-darker:#19A674;
    --accent-darker-10:rgba(25,166,116,0.10);
    --showcase-green:#12A050;
    --ebony:#1E232C;
    --ebony-70:#6A6E74;
    --ebony-65:#737780;
    --ebony-50:#8F9299;
    --mercury:#E8E8E8;
    --surface-light:#F7F7FA;
    --white:#FFFFFF;
    --border:rgba(30,35,44,0.10);
    --border-strong:rgba(30,35,44,0.18);
    --success-bg:rgba(25,166,116,0.10);
    --success-text:#0F6E56;
    --danger-bg:rgba(217,71,71,0.10);
    --danger-text:#A32D2D;
    --warn-bg:rgba(186,117,23,0.10);
    --warn-text:#854F0B;
    --info-bg:rgba(11,11,214,0.06);
    --info-text:#0C447C;
    --r-sm:6px;
    --r-md:10px;
    --r-lg:12px;
    --r-xl:16px;
    --shadow-resting:0 2px 6px rgba(15,23,42,0.04), 0 16px 40px -16px rgba(15,23,42,0.08);
    --max:1280px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--white);
    color:var(--ebony);
    font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:400;
    font-size:14px;
    line-height:1.5;
    letter-spacing:0;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 28px}
  @media (max-width:640px){.wrap{padding:0 16px}}
  header.masthead{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px}
  .masthead-row{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
  .brand .mark{font-weight:600;font-size:22px;line-height:1;letter-spacing:-0.01em;color:var(--ebony)}
  .brand .divider{height:16px;width:1px;background:var(--border-strong);align-self:center}
  .brand .label{text-transform:uppercase;letter-spacing:0.18em;font-size:11px;font-weight:600;color:var(--primary)}
  .masthead-meta{font-size:12px;color:var(--ebony-70);margin-top:4px}
  .freshness{text-align:right;color:var(--ebony-70);font-size:13px;line-height:1.45}
  .freshness .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent-darker);margin-right:6px;vertical-align:middle}
  .freshness.stale .dot{background:#F2DC13}
  .freshness.error .dot{background:var(--danger-text)}
  .freshness small{display:block;font-size:11px;margin-top:4px;text-transform:uppercase;letter-spacing:0.18em;font-weight:600}
  .sl{font-size:13px;font-weight:600;color:var(--ebony);margin:0 0 4px;letter-spacing:0}
  .sr{font-size:11.5px;color:var(--ebony-70);margin:0 0 14px;line-height:1.5}
  .mc{background:var(--surface-light);border-radius:var(--r-md);padding:14px 16px}
  .mc.featured{background:var(--white);border:1px solid var(--border-strong)}
  .mc .lbl{margin:0 0 4px;font-size:11.5px;color:var(--ebony-70);font-weight:500}
  .mc .val{margin:0;font-size:24px;font-weight:500;line-height:1;letter-spacing:-0.01em;color:var(--ebony);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .mc .val.success{color:var(--accent-darker)}
  .mc .val.muted{color:var(--ebony-50)}
  .mc .val.info{color:var(--primary)}
  .mc .sub{margin:4px 0 0;font-size:11px;color:var(--ebony-70);line-height:1.4}
  .mc .conn{margin:8px 0 0;padding-top:8px;border-top:1px solid var(--border);font-size:11.5px;color:var(--ebony-70);display:flex;justify-content:space-between;align-items:baseline}
  .mc .conn b{color:var(--ebony);font-weight:500;font-size:13px;font-variant-numeric:tabular-nums}
  .mc-ph{background:var(--surface-light);border-radius:var(--r-md);padding:14px 16px;opacity:0.6}
  .mc-ph .lbl{margin:0 0 4px;font-size:11.5px;color:var(--ebony-70);font-weight:500}
  .mc-ph .val{margin:0;font-size:24px;font-weight:500;color:var(--ebony-50);font-variant-numeric:tabular-nums;line-height:1}
  .mc-ph .sub{margin:4px 0 0;font-size:11px;color:var(--ebony-70)}
  .mc-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
  .mc-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
  @media (max-width:520px){.mc-grid-2{grid-template-columns:1fr}}
  .panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow-resting)}
  .panel-title{margin:0 0 10px;font-size:13px;font-weight:600;color:var(--ebony)}
  .panel-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;font-size:11.5px;color:var(--ebony-70)}
  .panel-legend span{display:flex;align-items:center;gap:6px}
  .panel-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
  .div{height:1px;background:var(--border);margin:32px 0}
  .seq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:12px;margin-bottom:20px}
  .sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-resting)}
  .sc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
  .sc-head .name{margin:0;font-size:12.5px;font-weight:500;line-height:1.4;color:var(--ebony)}
  .sc-head .meta{margin:4px 0 0;font-size:11px;color:var(--ebony-70);font-variant-numeric:tabular-nums}
  .sc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
  .ss{background:var(--surface-light);border-radius:var(--r-sm);padding:8px 10px;min-width:0}
  .ss .l{margin:0 0 2px;font-size:10.5px;color:var(--ebony-70);font-weight:500}
  .ss .v{margin:0;font-size:16px;font-weight:500;line-height:1.1;color:var(--ebony);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .ss .v.success{color:var(--accent-darker)}
  .ss .v.danger{color:var(--danger-text)}
  .ss .v.info{color:var(--primary)}
  .ss .v.muted{color:var(--ebony-50)}
  .ss .v.warn{color:var(--warn-text)}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;line-height:1.4;flex-shrink:0;text-transform:lowercase;letter-spacing:0}
  .pill.active{background:var(--success-bg);color:var(--success-text)}
  .pill.paused{background:var(--surface-light);color:var(--ebony-70)}
  .pill.danger{background:var(--danger-bg);color:var(--danger-text)}
  .pill.warn{background:var(--warn-bg);color:var(--warn-text)}
  .pill.success{background:var(--success-bg);color:var(--success-text)}
  .pill.info{background:var(--info-bg);color:var(--info-text)}
  #funnel{padding:6px 0}
  .funnel-row{display:flex;flex-direction:column;align-items:center;margin-bottom:2px}
  .funnel-drop{font-size:11.5px;color:var(--ebony-70);padding:5px 0;text-align:center}
  .funnel-drop b{color:var(--ebony);font-weight:500}
  .funnel-bar{border-radius:var(--r-sm);padding:11px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-sizing:border-box;color:var(--white)}
  .funnel-bar .left p:first-child{margin:0;font-size:12.5px;font-weight:500;color:var(--white)}
  .funnel-bar .left p:last-child{margin:2px 0 0;font-size:11px;color:rgba(255,255,255,0.78)}
  .funnel-bar .right{text-align:right;flex-shrink:0;font-size:20px;font-weight:500;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .pipeline-flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:10px}
  .pstage{background:var(--white);padding:14px 12px;text-align:center}
  .pstage .lbl{margin:0 0 4px;font-size:11px;color:var(--ebony-70);font-weight:500}
  .pstage .val{margin:0;font-size:24px;font-weight:500;line-height:1;letter-spacing:-0.01em;color:var(--ebony);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .pstage .val.muted{color:var(--ebony-50)}
  .note{font-size:11.5px;color:var(--ebony-70);background:var(--surface-light);border-radius:var(--r-md);padding:10px 12px;margin-top:10px;line-height:1.5}
  .note.setup{display:flex;align-items:flex-start;gap:8px}
  .note .icon{flex-shrink:0;margin-top:1px;color:var(--primary)}
  .note .icon svg{width:14px;height:14px;display:block;stroke:currentColor;stroke-width:1.75;fill:none}
  footer{margin-top:80px;padding:32px 0 40px;border-top:1px solid var(--border);color:var(--ebony-70);font-size:12.5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  footer a{color:var(--primary);text-decoration:none;font-weight:500}
  footer a:hover{text-decoration:underline}
  footer code{font-family:"IBM Plex Sans",sans-serif;font-size:12px;color:var(--ebony);background:var(--surface-light);padding:2px 8px;border-radius:var(--r-sm)}
  .loading{padding:80px 0;text-align:center;color:var(--ebony-70);font-size:13px}
  .error-banner{padding:16px 20px;background:var(--danger-bg);border:1px solid rgba(163,45,45,0.30);border-radius:var(--r-md);color:var(--danger-text);font-size:13px;margin:20px 0;line-height:1.5}
  .error-banner strong{display:block;margin-bottom:4px;font-weight:600}
  .error-banner code{font-family:"IBM Plex Sans",sans-serif;background:rgba(255,255,255,0.5);padding:1px 6px;border-radius:4px;font-size:12px}
</style>
</head>
<body>

<div class="wrap">

  <header class="masthead">
    <div class="masthead-row">
      <div>
        <div class="brand">
          <span class="mark">Supercept</span>
          <span class="divider"></span>
          <span class="label">GTM Dashboard</span>
        </div>
        <div class="masthead-meta" id="masthead-meta">Loading...</div>
      </div>
      <div class="freshness" id="freshness">
        <div><span class="dot"></span><span id="as-of">Loading...</span></div>
        <small id="freshness-label">Loading</small>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading">Loading dashboard data...</div>
  </div>

  <footer>
    <div>Source: <code>data.json</code> &middot; refreshed daily via Cowork pipeline plus on-demand</div>
    <div><a href="https://www.notion.so/36e406423d7181e69e88e5d0d718f4a3">PRD</a> &middot; <a href="https://www.notion.so/36e406423d718113b3f6c9d33c8d9488">Metrics spec</a> &middot; <a href="https://www.notion.so/36f406423d7181d9921ae21b75a9f1a5">Iteration log</a></div>
  </footer>

</div>

<script>
const SCHEMA_VERSION_EXPECTED = 1;

const fmt = (n) => {
  if (n === null || n === undefined) return '\u2014';
  if (typeof n === 'number') return n.toLocaleString('en-AU');
  return String(n);
};
const fmtPct = (n) => {
  if (n === null || n === undefined) return '\u2014';
  if (typeof n === 'number') return n.toFixed(1) + '%';
  return String(n);
};
const fmtDays = (n) => {
  if (n === null || n === undefined) return '\u2014';
  if (typeof n !== 'number') return String(n);
  return '~' + n.toFixed(1) + 'd';
};
const fmtRate = (n) => {
  if (n === null || n === undefined) return '\u2014';
  if (typeof n !== 'number') return String(n);
  return n.toFixed(1) + '/d';
};
const escapeHtml = (s) => {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
};

function runwayPill(days, status) {
  if (status === 'paused') return { cls: 'paused', text: 'paused' };
  if (days === null || days === undefined) return { cls: 'paused', text: '\u2014' };
  if (days < 3) return { cls: 'danger', text: fmtDays(days) + ' \u26A0' };
  if (days < 7) return { cls: 'warn', text: fmtDays(days) + ' \u26A0' };
  return { cls: 'success', text: fmtDays(days) };
}

function runwayValClass(days, status) {
  if (status === 'paused') return 'muted';
  if (days === null || days === undefined) return 'muted';
  if (days < 3) return 'danger';
  if (days < 7) return 'warn';
  return 'success';
}

function showError(title, detail) {
  document.getElementById('as-of').textContent = 'Data load failed';
  document.getElementById('freshness-label').textContent = 'Error';
  document.getElementById('freshness').classList.add('error');
  document.getElementById('masthead-meta').textContent = 'Live data could not be loaded';
  document.getElementById('app').innerHTML = `
    <div class="error-banner">
      <strong>${escapeHtml(title)}</strong>
      ${escapeHtml(detail)}<br>
      The Cowork refresh pipeline writes <code>data.json</code> nightly at 23:00 AEST.
      If this persists, check the latest commit on
      <a href="https://github.com/superceptai/gtm-dashboard/commits/main" style="color:inherit;text-decoration:underline">GitHub</a>
      or open the <a href="https://www.notion.so/36f406423d7181d9921ae21b75a9f1a5" style="color:inherit;text-decoration:underline">iteration log</a>.
    </div>
  `;
}

async function loadData() {
  let data;
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) {
      showError('Could not load data.json', `HTTP ${res.status} ${res.statusText}.`);
      return;
    }
    data = await res.json();
  } catch (e) {
    showError('Could not load data.json', `Fetch or parse failed: ${e.message}.`);
    return;
  }

  if (data.schema_version !== undefined && data.schema_version !== SCHEMA_VERSION_EXPECTED) {
    console.warn(
      `schema_version mismatch: renderer expects ${SCHEMA_VERSION_EXPECTED}, data.json has ${data.schema_version}. ` +
      `Rendering may be incomplete or incorrect.`
    );
  }

  try {
    render(data);
  } catch (e) {
    console.error('Render failed:', e);
    showError('Dashboard render failed', `${e.message}. The data file loaded successfully but the renderer hit an error.`);
  }
}

function render(d) {
  const fetched = new Date(d.last_updated);
  const now = new Date();
  const hours = (now - fetched) / 36e5;
  document.getElementById('as-of').textContent = d.as_of_label || fetched.toDateString();
  document.getElementById('freshness-label').textContent = hours < 24 ? 'Live' : 'Stale';
  document.getElementById('masthead-meta').textContent = d.feed_label || '';
  const fEl = document.getElementById('freshness');
  fEl.classList.remove('error');
  if (hours >= 24) fEl.classList.add('stale');
  else fEl.classList.remove('stale');

  const newCellClass = (s) => {
    if (s.status === 'paused') return 'info';
    if (typeof s.new === 'number' && s.new < 200) return 'danger';
    return '';
  };

  document.getElementById('app').innerHTML = `

    <p class="sl">ICP database \u2014 combined ANZ</p>
    <p class="sr">All ANZ companies \u00B7 No. Sellers = 3, 4, 5-9, 10-19, 20-49, 50+ \u00B7 Company Country = Australia or New Zealand</p>
    <div class="mc-grid-4">
      <div class="mc featured"><p class="lbl">Total ICP</p><p class="val">${fmt(d.icp.combined.total)}</p><p class="sub">all ANZ companies</p></div>
      <div class="mc featured"><p class="lbl">Core ICP (5-19)</p><p class="val success">${fmt(d.icp.combined.core_5_19)}</p><p class="sub">${fmtPct(d.icp.combined.core_pct)} of combined</p></div>
      <div class="mc featured"><p class="lbl">Borderline (3-4)</p><p class="val muted">${fmt(d.icp.combined.borderline_3_4)}</p><p class="sub">${fmtPct(d.icp.combined.borderline_pct)} of combined</p></div>
      <div class="mc featured"><p class="lbl">High value (20+)</p><p class="val info">${fmt(d.icp.combined.high_value_20p)}</p><p class="sub">${fmtPct(d.icp.combined.high_value_pct)} of combined</p></div>
    </div>
    <div class="mc-grid-2">
      <div class="mc featured"><p class="lbl">CEO contacts</p><p class="val">${fmt(d.icp.combined.ceo_contacts)}</p><p class="sub">all ANZ ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.combined.ceo_1st)} \u00B7 ${fmtPct(d.icp.combined.ceo_1st_pct)}</b></div></div>
      <div class="mc featured"><p class="lbl">CRO contacts</p><p class="val">${fmt(d.icp.combined.cro_contacts)}</p><p class="sub">all ANZ ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.combined.cro_1st)} \u00B7 ${fmtPct(d.icp.combined.cro_1st_pct)}</b></div></div>
    </div>

    <div class="div"></div>

    <p class="sl">ICP database \u2014 HubSpot ANZ</p>
    <p class="sr">HubSpot Technologies = True \u00B7 No. Sellers = 3, 4, 5-9, 10-19, 20-49, 50+ \u00B7 Company Country = Australia or New Zealand</p>
    <div class="mc-grid-4">
      <div class="mc"><p class="lbl">Total ICP</p><p class="val">${fmt(d.icp.hubspot.total)}</p><p class="sub">HubSpot ANZ companies</p></div>
      <div class="mc"><p class="lbl">Core ICP (5-19)</p><p class="val success">${fmt(d.icp.hubspot.core_5_19)}</p><p class="sub">${fmtPct(d.icp.hubspot.core_pct)}</p></div>
      <div class="mc"><p class="lbl">Borderline (3-4)</p><p class="val muted">${fmt(d.icp.hubspot.borderline_3_4)}</p><p class="sub">${fmtPct(d.icp.hubspot.borderline_pct)}</p></div>
      <div class="mc"><p class="lbl">High value (20+)</p><p class="val info">${fmt(d.icp.hubspot.high_value_20p)}</p><p class="sub">20-49: ${fmt(d.icp.hubspot.hv_20_49)} \u00B7 50+: ${fmt(d.icp.hubspot.hv_50p)}</p></div>
    </div>
    <div class="mc-grid-2">
      <div class="mc"><p class="lbl">CEO contacts</p><p class="val">${fmt(d.icp.hubspot.ceo_contacts)}</p><p class="sub">at HubSpot ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.hubspot.ceo_1st)} \u00B7 ${fmtPct(d.icp.hubspot.ceo_1st_pct)}</b></div></div>
      <div class="mc"><p class="lbl">CRO contacts</p><p class="val">${fmt(d.icp.hubspot.cro_contacts)}</p><p class="sub">at HubSpot ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.hubspot.cro_1st)} \u00B7 ${fmtPct(d.icp.hubspot.cro_1st_pct)}</b></div></div>
    </div>

    <div class="div"></div>

    <p class="sl">ICP database \u2014 non-HubSpot ANZ</p>
    <p class="sr">HubSpot Technologies \u2260 True \u00B7 No. Sellers = 3, 4, 5-9, 10-19, 20-49, 50+ \u00B7 Company Country = Australia or New Zealand</p>
    <div class="mc-grid-4">
      <div class="mc"><p class="lbl">Total ICP</p><p class="val">${fmt(d.icp.non_hubspot.total)}</p><p class="sub">non-HubSpot ANZ companies</p></div>
      <div class="mc"><p class="lbl">Core ICP (5-19)</p><p class="val success">${fmt(d.icp.non_hubspot.core_5_19)}</p><p class="sub">${fmtPct(d.icp.non_hubspot.core_pct)}</p></div>
      <div class="mc"><p class="lbl">Borderline (3-4)</p><p class="val muted">${fmt(d.icp.non_hubspot.borderline_3_4)}</p><p class="sub">${fmtPct(d.icp.non_hubspot.borderline_pct)}</p></div>
      <div class="mc"><p class="lbl">High value (20+)</p><p class="val info">${fmt(d.icp.non_hubspot.high_value_20p)}</p><p class="sub">20-49: ${fmt(d.icp.non_hubspot.hv_20_49)} \u00B7 50+: ${fmt(d.icp.non_hubspot.hv_50p)}</p></div>
    </div>
    <div class="mc-grid-2">
      <div class="mc"><p class="lbl">CEO contacts</p><p class="val">${fmt(d.icp.non_hubspot.ceo_contacts)}</p><p class="sub">at non-HubSpot ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.non_hubspot.ceo_1st)} \u00B7 ${fmtPct(d.icp.non_hubspot.ceo_1st_pct)}</b></div></div>
      <div class="mc"><p class="lbl">CRO contacts</p><p class="val">${fmt(d.icp.non_hubspot.cro_contacts)}</p><p class="sub">at non-HubSpot ICP companies</p><div class="conn">1st connections<b>${fmt(d.icp.non_hubspot.cro_1st)} \u00B7 ${fmtPct(d.icp.non_hubspot.cro_1st_pct)}</b></div></div>
    </div>

    <div class="panel">
      <p class="panel-title">Companies by seller band \u2014 HubSpot vs non-HubSpot</p>
      <div class="panel-legend">
        <span><i style="background:var(--primary)"></i>HubSpot ANZ</span>
        <span><i style="background:var(--secondary)"></i>Non-HubSpot ANZ</span>
      </div>
      <div style="position:relative;width:100%;height:220px"><canvas id="bandChart"></canvas></div>
    </div>

    <div class="div"></div>

    <p class="sl">Outbound engine \u2014 Reply.io</p>
    <p class="sr">New = queued, not yet in sequence \u00B7 Pending = invite sent, awaiting acceptance \u00B7 Finished = sequence complete \u00B7 Connected = accepted \u00B7 Runway calculated from 7-day average send rate per sequence</p>
    <div class="seq-grid">
      ${d.sequences.map(s => {
        const runway = runwayPill(s.runway_days, s.status);
        const runwayLabel = s.status === 'paused' ? 'If active' : 'Runway';
        const runwayValCls = runwayValClass(s.runway_days, s.status);
        const newCls = newCellClass(s);
        return `
          <div class="sc">
            <div class="sc-head">
              <div>
                <p class="name">${escapeHtml(s.name)}</p>
                <p class="meta">${escapeHtml(s.reply_id)} &middot; List ${escapeHtml(s.list_id)}</p>
              </div>
              <span class="pill ${runway.cls}">${runway.text}</span>
            </div>
            <div class="sc-stats">
              <div class="ss"><p class="l">New</p><p class="v ${newCls}">${fmt(s.new)}</p></div>
              <div class="ss"><p class="l">Pending</p><p class="v ${s.pending === 0 ? 'muted' : ''}">${fmt(s.pending)}</p></div>
              <div class="ss"><p class="l">Finished</p><p class="v ${s.finished === 0 ? 'muted' : ''}">${fmt(s.finished)}</p></div>
              <div class="ss"><p class="l">Connected</p><p class="v ${s.connected > 0 ? 'success' : 'muted'}">${fmt(s.connected)}</p></div>
            </div>
            <div class="sc-stats">
              <div class="ss"><p class="l">Total</p><p class="v">${fmt(s.total)}</p></div>
              <div class="ss"><p class="l">Accept rate</p><p class="v ${s.accept_rate === null || s.accept_rate === undefined ? 'muted' : ''}">${fmtPct(s.accept_rate)}</p></div>
              <div class="ss"><p class="l">Rate</p><p class="v ${s.rate_per_day === null || s.rate_per_day === undefined ? 'muted' : ''}">${fmtRate(s.rate_per_day)}</p></div>
              <div class="ss"><p class="l">${runwayLabel}</p><p class="v ${runwayValCls}">${fmtDays(s.runway_days)}${s.status !== 'paused' && typeof s.runway_days === 'number' && s.runway_days < 7 ? ' \u26A0' : ''}</p></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="div"></div>

    <p class="sl">Outreach funnel</p>
    <p class="sr">ICP contacts in HubSpot database \u2192 enrolled in Reply.io sequences \u2192 invite sent \u2192 connected${d.funnel.note ? ' \u00B7 ' + escapeHtml(d.funnel.note) : ''}</p>
    <div class="panel">
      <div id="funnel"></div>
    </div>

    <div class="div"></div>

    <p class="sl">Beta pipeline</p>
    <p class="sr">HubSpot pipeline 1663910348 \u00B7 test records excluded \u00B7 stages match private beta lifecycle</p>
    <div class="panel">
      <div class="pipeline-flow">
        ${d.pipeline.stages.map(st => `
          <div class="pstage">
            <p class="lbl">${escapeHtml(st.label)}</p>
            <p class="val ${st.deals === null || st.deals === undefined ? 'muted' : ''}">${st.deals === null || st.deals === undefined ? '\u2014' : fmt(st.deals)}</p>
          </div>
        `).join('')}
      </div>
      ${d.pipeline.note ? `<p style="margin:0;font-size:11.5px;color:var(--ebony-70)">${escapeHtml(d.pipeline.note)}</p>` : ''}
    </div>

    <div class="div"></div>

    <p class="sl">Website \u2014 GA4</p>
    <p class="sr">Last 7 days \u00B7 GA4 property G-HC97LYRCFE${d.ga4 && d.ga4.setup_note ? ' \u00B7 ' + escapeHtml(d.ga4.setup_note) : ''}</p>
    <div class="mc-grid-4">
      <div class="${d.ga4.sessions === null || d.ga4.sessions === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Sessions</p><p class="val">${fmt(d.ga4.sessions)}</p><p class="sub">last 7 days</p></div>
      <div class="${d.ga4.qualified === null || d.ga4.qualified === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Qualified applications</p><p class="val">${fmt(d.ga4.qualified)}</p><p class="sub">beta_application_qualified</p></div>
      <div class="${d.ga4.disqualified === null || d.ga4.disqualified === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Disqualified</p><p class="val">${fmt(d.ga4.disqualified)}</p><p class="sub">beta_application_disqualified</p></div>
      <div class="${d.ga4.intake === null || d.ga4.intake === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Intake calls booked</p><p class="val">${fmt(d.ga4.intake)}</p><p class="sub">intake_call_booked</p></div>
      <div class="${d.ga4.qualified_cvr === null || d.ga4.qualified_cvr === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Qualified CVR</p><p class="val">${fmtPct(d.ga4.qualified_cvr)}</p><p class="sub">qualified / sessions</p></div>
    </div>
    ${Array.isArray(d.ga4.daily) && d.ga4.daily.length > 0 ? `
      <div class="panel" style="margin-top:14px">
        <p class="panel-title">Daily sessions \u2014 last 7 days</p>
        <div style="position:relative;width:100%;height:180px"><canvas id="ga4DailyChart"></canvas></div>
      </div>
    ` : ''}

    <div class="div"></div>

    <p class="sl">LinkedIn \u2014 Aaron's profile</p>
    <p class="sr">Personal profile analytics${d.linkedin && d.linkedin.setup_note ? ' \u00B7 ' + escapeHtml(d.linkedin.setup_note) : ''}</p>
    <div class="mc-grid-4">
      <div class="mc"><p class="lbl">Followers</p><p class="val">${fmt(d.linkedin.followers)}</p><p class="sub">${d.linkedin.new_followers_30d !== null && d.linkedin.new_followers_30d !== undefined ? '+' + fmt(d.linkedin.new_followers_30d) + ' last 30d' : 'last 30d \u2014'}</p></div>
      <div class="${d.linkedin.impressions === null || d.linkedin.impressions === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Impressions</p><p class="val">${fmt(d.linkedin.impressions)}</p><p class="sub">this week</p></div>
      <div class="${d.linkedin.engagement === null || d.linkedin.engagement === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Engagement rate</p><p class="val">${fmtPct(d.linkedin.engagement)}</p><p class="sub">interactions / impressions</p></div>
      <div class="${d.linkedin.profile_views === null || d.linkedin.profile_views === undefined ? 'mc-ph' : 'mc'}"><p class="lbl">Profile views</p><p class="val">${fmt(d.linkedin.profile_views)}</p><p class="sub">this week</p></div>
    </div>

  `;

  setTimeout(() => {
    const ctx = document.getElementById('bandChart');
    if (ctx && window.Chart) {
      new Chart(ctx.getContext('2d'), {
        type: 'bar',
        data: {
          labels: d.bands.labels,
          datasets: [
            { label: 'HubSpot ANZ', data: d.bands.hubspot, backgroundColor: '#0B0BD6', borderRadius: 3, borderSkipped: false },
            { label: 'Non-HubSpot ANZ', data: d.bands.non_hubspot, backgroundColor: '#914BF9', borderRadius: 3, borderSkipped: false }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (c) => c.dataset.label + ': ' + c.raw.toLocaleString() } }
          },
          scales: {
            x: { grid: { color: 'rgba(30,35,44,0.06)' }, ticks: { color: '#6A6E74', font: { size: 11, family: 'IBM Plex Sans' }, autoSkip: false, maxRotation: 30 } },
            y: { grid: { color: 'rgba(30,35,44,0.06)' }, ticks: { color: '#6A6E74', font: { size: 11, family: 'IBM Plex Sans' }, callback: (v) => v.toLocaleString() } }
          }
        }
      });
    }

    const ga4Ctx = document.getElementById('ga4DailyChart');
    if (ga4Ctx && window.Chart && Array.isArray(d.ga4.daily) && d.ga4.daily.length > 0) {
      new Chart(ga4Ctx.getContext('2d'), {
        type: 'line',
        data: {
          labels: d.ga4.daily.map(p => p.date),
          datasets: [{
            label: 'Sessions',
            data: d.ga4.daily.map(p => p.sessions),
            borderColor: '#0B0BD6',
            backgroundColor: 'rgba(11,11,214,0.10)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#0B0BD6'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#6A6E74', font: { size: 11 } } },
            y: { beginAtZero: true, grid: { color: 'rgba(30,35,44,0.06)' }, ticks: { color: '#6A6E74', font: { size: 11 }, precision: 0 } }
          }
        }
      });
    }
  }, 0);

  const container = document.getElementById('funnel');
  if (container) {
    const stages = [
      { label: 'ICP contacts in HubSpot', sub: 'CEO + CRO, all ANZ ICP companies', n: d.funnel.icp_contacts, pct: null },
      { label: 'Enrolled in sequences', sub: 'across all 4 Reply.io sequences', n: d.funnel.enrolled, pct: fmtPct(d.funnel.enrolled_pct_of_icp) + ' of ICP' },
      { label: 'Invite sent', sub: 'active HubSpot sequences \u00B7 non-HS paused', n: d.funnel.invite_sent, pct: fmtPct(d.funnel.invite_sent_pct_of_enrolled) + ' of enrolled' },
      { label: 'Connected', sub: 'accepted LinkedIn connection', n: d.funnel.connected, pct: fmtPct(d.funnel.connected_pct_of_invited) + ' of invited' }
    ];
    const colorsAlt = ['#0B0BD6', '#0A50B0', '#0A6B92', '#0F6E56'];
    const maxN = stages[0].n || 1;
    const minW = 22, maxW = 100;
    const w = (n) => Math.round(minW + (maxW - minW) * Math.sqrt((n || 0) / maxN));

    container.innerHTML = '';
    stages.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'funnel-row';
      if (i > 0) {
        const drop = document.createElement('div');
        drop.className = 'funnel-drop';
        drop.innerHTML = '\u25BE <b>' + escapeHtml(s.pct) + '</b>';
        row.appendChild(drop);
      }
      const bar = document.createElement('div');
      bar.className = 'funnel-bar';
      bar.style.width = w(s.n) + '%';
      bar.style.background = colorsAlt[i];
      bar.innerHTML = `
        <div class="left">
          <p>${escapeHtml(s.label)}</p>
          <p>${escapeHtml(s.sub)}</p>
        </div>
        <div class="right">${fmt(s.n)}</div>
      `;
      row.appendChild(bar);
      container.appendChild(row);
    });
  }
}

loadData();
</script>

</body>
</html>
